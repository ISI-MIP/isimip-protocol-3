<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        {% block title %}
        <title>ISIMIP3 simulation protocol</title>
        {% endblock %}

        <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/js/app.css">
        <link rel="shortcut icon" href="assets/img/favicon-32x32.png" type="image/png"/>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light sticky-top">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <img src="assets/img/logo-white.png" alt="ISIMIP logo" />
                </a>
                <button
                    class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav align-items-center w-100">
                        <li class="nav-item me-auto">
                            <div data-component="title"></div>
                        </li>
                        <li class="nav-item dropdown">
                            <a
                                class="nav-link dropdown-toggle" href="#" id="tocDropdown" role="button"
                                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false"
                            >
                                Table of contents
                            </a>
                            <div class="dropdown-menu dropdown-menu-end toc-dropdown" aria-labelledby="tocDropdown"
                                 onclick="event.stopPropagation()">
                            </div>
                        </li>
                        <li class="nav-item dropdown">
                            <a
                                class="nav-link dropdown-toggle" href="#" id="configDropdown" role="button"
                                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false"
                            >
                                Simulation Round / Sectors
                            </a>
                            <div class="dropdown-menu dropdown-menu-end" aria-labelledby="configDropdown"
                                 onclick="event.stopPropagation()">
                                <div data-component="config"></div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main>
            <div class="container-lg">
                {% block content %}
                {{ html|safe }}
                {% endblock %}
            </div>
        </main>

        <footer>
            <div class="container">
                <div class="text-center">
                    <a href="https://www.isimip.org">The Inter-Sectoral Impact Model Intercomparison Project</a>.
                    For questions or clarifications, please contact <a href="mailto:info@isimip.org">info@isimip.org</a>.
                </div>
            </div>
        </footer>

        <div class="cover"></div>

        <script>
            window.store = {
                definitions : {{ definitions }},
                patterns: {{ patterns }},
                commit_url: '{{ commit_url }}',
                commit_hash: '{{ commit_hash }}',
                commit_date: '{{ commit_date }}'
            }
        </script>
        <script src="assets/js/app.js"></script>
    </body>
</html>
