- specifier: obsclim
  description: >-
    Observation-based climate related forcing.
  simulation_rounds:
  - ISIMIP4a

- specifier: counterclim
  description: >-
    De-trended climate related forcing, assuming the historical 1901 value of 296.13ppm
    for the CO₂ concentration and 928.80 ppb for the CH₄ concentration for the full
    period.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - diarrhea
  - fire
  - forestry
  - groundwater
  - health
  - coastal
  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_quality
  - water_regional

- specifier: ctrlclim
  simulation_rounds:
  - ISIMIP4a
  products:
  - InputData
  - SecondaryInputData

- specifier: spinclim
  simulation_rounds:
  - ISIMIP4a
  products:
  - InputData

- specifier: transclim
  simulation_rounds:
  - ISIMIP4a
  products:
  - InputData
  - SecondaryInputData

- specifier: picontrol
  description: >-
    GCM-based pre-industrial climate related forcing, CO₂ and CH₄ concentrations fixed
    at 1850 levels.
  simulation_rounds:
  - ISIMIP4b

- specifier: historical
  description: >-
    GCM-based historical climate related forcing, historical changes in CO₂ and CH₄
    concentrations.
  simulation_rounds:
  - ISIMIP4b

- specifier: scen7-vl
  description: >-
    GCM-based climate related forcing according to the *Very Low emission scenario*.
  simulation_rounds:
  - ISIMIP4b

- specifier: scen7-h
  description: >-
    GCM-based climate related forcing according to the *High emission scenario*.
  simulation_rounds:
  - ISIMIP4b
