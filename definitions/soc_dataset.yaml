    long_name: Fishing country, in ISO3 notation. Ex supranational entities (USSR,
      Yugoslavia) are disaggregated to their constituent countries. Serbian Fishing
      Effort included with Montenegro
    units: ''
  - specifier: Sector
    long_name: Fishing sector (artisanal/industrial), defined by the law of the country
      (varies by country)
    units: ''
  - specifier: LMEnbr
    long_name: A number code to the LME, as per NOAA notation
    units: ''
  - specifier: FAOnbr
    long_name: A number code to the FAO area
    units: ''
