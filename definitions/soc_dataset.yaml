  specifier_file: effort
  title: Fishing effort
  group: fishing
  mandatory: true
  frequency: annual
  resolution: Marine ecosystems or exclusive economic zones
  path: ISIMIP4b/InputData/socioeconomic/fishing/histsoc/effort_isimip3b-phase1_histsoc_1950_2014.csv
  variables:
  - specifier: FAO
    long_name: The generic name of the FAO area in which the Effort/Catch is occurring
    units: ''
  - specifier: EEZ
    long_name: The EEZ / high seas name in which the Effort/Catch is occurring
    units: ''
  - specifier: LME
    long_name: The generic name of the Large Marine ecosystem in which the Effort/Catch
      is occurring
    units: ''
  - specifier: FGroup
    long_name: Functional Group of the target species
    units: ''
  - specifier: NomEffReported
    long_name: Nominal (i.e. not including the technological creep) fishing effort
      corresponding to the reported catch
    units: kW.days
  - specifier: NomEffIUU
    long_name: Nominal (i.e. not including the technological creep) fishing effort
      corresponding to the illegal catch and discards
    units: kW.days
  - specifier: Year
    long_name: Year (end of the year) when the Effort/Catch is occurring
    units: year
  - specifier: AreaSqKm2
    long_name: Water surface area
    units: km2
  - specifier: NbrCells
    long_name: Number of 0.5 degree cell making up the area
    units: ''
