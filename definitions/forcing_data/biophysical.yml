- specifier: biophysical-yield
  group: biophysical-forcing
  title: Crop Yields
  mandatory: mandatory
  doi:
    ISIMIP4a:
    ISIMIP4b:
  path:
    ISIMIP4a:
      - ISIMIP4a/OutputData/agriculture/<model>/<climate-forcing>/historical/<model>_<climate-forcing>_<climate-scenario>_<soc-scenario>_<sens-scenario>_yield-<irrigation>-<crop>_global_annual-gs.nc
    ISIMIP4b:
      - ISIMIP4b/OutputData/agriculture/<model>/<climate-forcing>/pre-industrial/<model>_<climate-forcing>_w5e5_<climate-scenario>_<soc-scenario>_<sens-scenario>_yield-<irrigation>-<crop>_global_annual-gs.nc
      - ISIMIP4b/OutputData/agriculture/<model>/<climate-forcing>/historical/<model>_<climate-forcing>_w5e5_<climate-scenario>_<soc-scenario>_<sens-scenario>_yield-<irrigation>-<crop>_global_annual-gs.nc
      - ISIMIP4b/OutputData/agriculture/<model>/<climate-forcing>/future/<model>_<climate-forcing>_w5e5_<climate-scenario>_<soc-scenario>_<sens-scenario>_yield-<irrigation>-<crop>_global_annual-gs.nc
  sectors:
  - fs-n

