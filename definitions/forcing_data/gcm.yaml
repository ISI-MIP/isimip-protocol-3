- specifier: gcm_climate_atmosphere
  group: gcm-forcing
  title: GCM-based atmospheric forcing
  status: mandatory
  doi:
  path:
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/picontrol/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/historical/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/vl/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/h/
  comment: >-
    Input dataset documentation → [GFDL-ESM4](https://www.isimip.org/gettingstarted/input-data-bias-adjustment),
    [IPSL-CM6A-LR](https://www.isimip.org/gettingstarted/input-data-bias-adjustment),
    [MPI-ESM1-2-HR](https://www.isimip.org/gettingstarted/input-data-bias-adjustment),
    [MRI-ESM2-0](https://www.isimip.org/gettingstarted/input-data-bias-adjustment),
    [UKESM1-0-LL](https://www.isimip.org/gettingstarted/input-data-bias-adjustment).
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - energy_demand
  - fire
  - forestry
  - health
  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: gcm_climate_atmosphere_local
  group: gcm-forcing
  title: Local atmospheric climate forcing for lake locations
  status: mandatory
  doi:
  path:
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/picontrol/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/historical/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/vl/
  - ISIMIP4b/InputData/climate/atmosphere/bias-adjusted/global/daily/h/
  comment: >-
    Extractions of grid cell data from global atmospheric climate forcing. See list
    of lakes sites [here](https://www.isimip.org/gettingstarted/input-data-bias-adjustment/isimip3-local-lake-sites/).
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - lakes_local

- specifier: gcm_tropical_cyclones_tracks
  group: gcm-forcing
  title: Tropical cyclone tracks
  status: mandatory
  doi:
  path:
  - ISIMIP4b/InputData/climate/tropical_cyclones/MIT/tracks/
  - ISIMIP4b/InputData/climate/tropical_cyclones/CHAZ/tracks/
  comment: >-
    Samples of synthetic tropical cyclone tracks derived from the five CMIP6 GCMs considered within ISIMIP generated by two different statistical downscaling approaches: MIT and CHAZ. The data shall be used for non‐commercial research or academic purposes only. Access can be requested through the ISIMIP Repository.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - coastal

- specifier: gcm_tropical_cyclones_global
  group: gcm-forcing
  title: Tropical cyclone wind and rain fields
  status: mandatory
  doi:
  path:
  - ISIMIP4b/InputData/climate/tropical_cyclones/MIT/global/
  comment: >-
    For tracks generated by the MIT approach we also provide wind and rain fields.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - coastal

- specifier: gcm_lightning
  group: gcm-forcing
  title: Lightning
  status: mandatory
  doi:
  - https://doi.org/10.5067/LIS/LIS-OTD/DATA303
  path: ISIMIP4b/InputData/climate/lightning/lightning_fixed.nc
  comment: >-
    Flash Rate Monthly Climatology, not changing with climate change.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - fire

