- specifier: obsclim_climate_atmosphere
  group: obsclim-forcing
  title: Standard observation-based atmospheric climate forcing
  status: mandatory
  doi:
  path: ISIMIP4a/InputData/climate/atmosphere/obsclim/global/
  comment: >-
    Input dataset documentation → [Example-W5E5](https://www.isimip.org/gettingstarted/input-data-bias-adjustment/)
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - energy_demand
  - fire
  - groundwater
  - forestry
  - health
  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_quality
  - water_regional

- specifier: obsclim_climate_atmosphere_local
  group: obsclim-forcing
  title: Local atmospheric climate forcing for lake locations
  status: mandatory
  doi:
  path: ISIMIP4a/InputData/climate/atmosphere/obsclim/lake-sites/
  comment: >-
    Extractions of grid cell data from global atmospheric climate forcing. See list
    of lakes sites [here](https://www.isimip.org/gettingstarted/input-data-bias-adjustment/isimip3-local-lake-sites/).
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - lakes_local

- specifier: obsclim_tropical_cyclones
  group: obsclim-forcing
  title: Tropical cyclone tracks and windfields
  status: mandatory
  doi:
  path: ISIMIP4a/InputData/climate/tropical_cyclones/obsclim/
  comment: >-
    Input dataset documentation → [Tropical cyclone (TC) data](https://www.isimip.org/gettingstarted/input-data-bias-adjustment).
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - coastal

- specifier: obsclim_lightning
  group: obsclim-forcing
  title: Lightning
  status: mandatory
  doi:
  - https://doi.org/10.5067/LIS/LIS-OTD/DATA303
  path: ISIMIP4a/InputData/climate/lightning/
  comment: >-
    Flash Rate Monthly Climatology, not changing with climate change
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - fire

- specifier: obsclim_ocean
  group: obsclim-forcing
  title: Standard observation-based oceanic forcing data
  status: mandatory
  doi:
  path: ISIMIP4a/InputData/climate/ocean/obsclim/global/
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - marine-fishery_global
  - marine-fishery_regional

- specifier: obsclim_ocean_regional
  group: obsclim-forcing
  title: Regional oceanic climate forcing for regional marine ecosystems and fisheries
    sector
  status: mandatory
  doi:
  path: ISIMIP4a/InputData/climate/ocean/obsclim/regional/
  comment: >-
    Extractions of grid cell data from global atmospheric climate forcing.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - marine-fishery_regional

- specifier: obsclim_coastal_water_levels
  group: obsclim-forcing
