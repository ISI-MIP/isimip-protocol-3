- specifier: static-lakes
  group: static-forcing
  title: Geographical lakes input data
  status: optional
  doi:
  path:
    ISIMIP4a: ISIMIP4a/InputData/geo_conditions/lakes/
    ISIMIP4b: ISIMIP4b/InputData/geo_conditions/lakes/
  comment: >-
    Contains *Lake volume at different depths*, *Lake area at different depths*, *Lake elevation*, *Maximum lake depth*, *Lake depth*, *Lake volume*, *Lake surface area*, *HydroLAKES ID*, *HydroLAKES IDs for big lakes*, and *Big lakes mask*.
  sectors:
  - groundwater
  - lakes_global
  - lakes_local
  - water_global
  - water_quality

