- specifier: histsoc
  description: >-
    Varying direct human influences in the historical period.
  description_note: Please label your model run `histsoc` **even if** it only partly
    accounts for varying direct human forcings while another part of the the direct
    human forcing is considered constant or is ignored.
  simulation_rounds:
  - ISIMIP4a
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - fire
  - forestry
  - fs-n
  - groundwater
  - health
  - labour
  - lakes_global
  - lakes_local
  - marine-fishery_global
  - marine-fishery_regional
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: 1850soc
  description: >-
    Fixed year-1850 direct human influences (e.g. land use, nitrogen deposition and
    fertilizer input, fishing effort).
  description_note: Please label your simulations `1850soc` if they do not at all
    account for historical changes in direct human forcing, but they do represent
    constant year-1850 levels of direct human forcing for at least some direct human
    forcings. This scenario may be thought of an approximation of pre-industrial levels
    of human impacts.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - diarrhea
  - fire
  - health
  - coastal
  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: 1850soc-input-only
  specifier_file: 1850soc
  simulation_rounds:
  - ISIMIP4a
  products:
  - InputData

- specifier: 1901soc
  description: >-
    Fixed year-1901 direct human influences (e.g. land use, nitrogen deposition and
    fertilizer input, fishing effort).
  description_note: Please only label your model run `1901soc` if it does not at all
    account for historical changes in direct human forcing, but they do represent
    constant year-1901 levels of direct human forcing for at least some direct human
    forcings. This scenario may be thought of an approximation of pre-industrial levels
    of human impacts.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - biomes
  - groundwater
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_quality

- specifier: 2021soc
  description: >-
    Fixed year-2021 direct human influences (e.g. land use, nitrogen deposition and
    fertilizer input, fishing effort).
  description_note: Please label your simulations `2021soc` if they do not at all
    account for historical changes in direct human forcing, but they do represent
    constant year-2021 levels of direct human forcing for at least some direct human
    forcings.
  simulation_rounds:
  - ISIMIP4a
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - energy_demand
  - fire
  - groundwater
