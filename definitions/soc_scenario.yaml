  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: 2021soc-from-histsoc
  description: >-
    Fixed year-2021 direct human influences (e.g. land use, nitrogen deposition and
    fertilizer input, fishing effort) for the future period, if the historical period
    was using varying direct human influences in the historical period.
  description_note: Please label your simulations `2021soc-from-histsoc` for the future
    period, if your model run extends a historical period which used the `histsoc`
    scenario. This distinguishes the data from experiments which use both `2021soc`
    in the past and the future. If your model output is identical for both cases,
    please only submit the `2021soc` files for the future period.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - fire
  - forestry
  - fs-n
  - groundwater
  - health
  - labour
  - lakes_global
  - lakes_local
  - marine-fishery_global
  - marine-fishery_regional
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: vl-noadapt
  description: >-
    Varying direct human influences in the future period according to the *Very Low emission scenario*,
    not accounting for the impact of climate change under the corresponding climate.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biomes
  - fire
  - peat
  - permafrost
  - water_global
  group3: true

- specifier: vl-adapt
  description: >-
    Varying direct human influences in the future period according to the *Very Low emission scenario*,
    accounting for the impact of climate change under the corresponding climate.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biomes
  - fire
  - peat
  - permafrost
  - water_global
  group3: true

