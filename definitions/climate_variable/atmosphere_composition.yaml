- specifier: co2
  long_name: Atmospheric CO₂ concentration
  group: atmospheric-composition
  mandatory: true
  units: ppm
  frequency: annual
  resolution: global
  path:
    ISIMIP4a: ISIMIP4a/InputData/climate/atmosphere_composition/co2/<climate-scenario>/co2_<climate-scenario>_annual_<start_year>_<end_year>.txt
    ISIMIP4b: ISIMIP4b/InputData/climate/atmosphere_composition/co2/<climate-scenario>/co2_<climate-scenario>_annual_<start_year>_<end_year>.txt
  comment:
    ISIMIP4a: Input dataset documentation → [Globally averaged CO₂ and CH₄ annual
      data](https://www.isimip.org/gettingstarted/input-data-bias-adjustment).
    ISIMIP4b: ''
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - energy_demand
  - fire
  - forestry
  - groundwater
  - health
  - fs-n
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

