- specifier: amphibianprob
  long_name: Amphibian Species Likelihood of Occurrence
  group: biodiversity-variables
  units: 1
  frequency: "annual, 30year-mean (1981-2010) for SDMs"
  resolution: 0.5° grid
  comment: >-
    Likelihood that a given species is present at a specific location based on environmental conditions and model predictions.
    It represents a relative measure of habitat suitability rather than a direct observation of presence.
  sectors:
  - biodiversity
  dimensions:
  - time
  - species
  - lat
  - lon
  valid_max: 1.0
  valid_min: 0.0

- specifier: amphibianocc
  long_name: Amphibian Species Propability with Threshold of Occurrence
  group: biodiversity-variables
  units: 0 or 1
  frequency: "annual, 30year-mean (1981-2010) for SDMs"

  resolution: 0.5° grid
  comment: >-
    Thresholded probability of occurrence classifying each location as either suitable (1) or unsuitable (0)
    for a species based on an optimized, species-specific threshold.
  sectors:
  - biodiversity
  dimensions:
  - time
  - species
  - lat
  - lon
  valid_max: 1.0
  valid_min: 0.0

- specifier: amphibianbuff
  long_name: Amphibian Buffer
  group: biodiversity-variables
  units: 1
  frequency: "annual, 30year-mean (1981-2010) for SDMs"

  resolution: 0.5° grid
  comment: >-
    Buffer around the presence points on which the model is trained.
    (for species distribution models a buffer of 1000km was applied and for dynamic occupancy models a buffer of 750km was applied)
  sectors:
  - biodiversity
  dimensions:
  - time
  - species
  - lat
  - lon
  valid_max: 1.0
  valid_min: 0.0

- specifier: amphibianpbuffer
  long_name: Amphibian Probability Buffer
  group: biodiversity-variables
  units: 1
  frequency: "annual, 30year-mean (1981-2010) for SDMs"

  resolution: 0.5° grid
  comment: >-
    Amphibian probability masked by `Amphibian Buffer`.
  sectors:
  - biodiversity
  dimensions:
  - time
  - species
  - lat
  - lon
  valid_max: 1.0
  valid_min: 0.0

- specifier: amphibianoccbuff
  long_name: Amphibian Occurrence Buffer
