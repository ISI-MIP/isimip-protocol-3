- specifier: default
  description: >-
    For all experiments other than the sensitivity experiments.

- specifier: 1901co2
  description: >-
    CO₂ concentration fixed at 1901 levels as a deviation from the `obsclim` climate
    + CO₂ forcing.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - energy_demand
  - fire
  - forestry
  - groundwater
  - health
  - labour
  - lakes_global
  - lakes_local
  - peat
  - permafrost
  - water_global
  - water_regional

- specifier: obsco2
  description: >-
    Observation-based CO₂ concentration (as in `obsclim`) used with `counterclim`
    atmospheric forcing.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - biomes
  - fire
  - forestry
  - peat
  - permafrost

- specifier: nowatermgt
  description: >-
    No water management (e.g. no human water abstraction, no reservoirs) while other
    direct human forcings such as land use changes are considered according to `histsoc`
    or `2021soc`.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - groundwater
  - water_global
  - water_regional

- specifier: 1901irr
  description: >-
    Fixed year-1901 irrigation areas and water use efficiencies but representation
    of other direct human influences such as land use changes according to `histsoc`.
    This experiment is related to the IRRMIP initiative.
  simulation_rounds:
  - ISIMIP4a
  sectors:
  - water_global
  - water_regional

- specifier: nofire
  description: >-
    Simulation with fire switched off to identify impact of fire within the model.
  simulation_rounds:
  - ISIMIP4a
  - ISIMIP4b
  sectors:
  - biomes
  - fire
  - peat
  - permafrost

- specifier: 2021co2
  description: >-
    CO₂ concentration fixed at 2021 levels.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  - biodiversity
  - biomes
  - coastal
  - diarrhea
  - fire
  - forestry
  - fs-n
  - groundwater
  - health
  - labour
  - lakes_global
  - lakes_local
  - marine-fishery_global
  - marine-fishery_regional
  - peat
  - permafrost
  - water_global
  - water_regional
  - water_quality

- specifier: hco2
  description: >-
    CO₂ concentration according to the *High emission scenario*.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - peat

- specifier: vlndep
  description: >-
    Nitrogen deposition according to the *Very Low emission scenario*.
  simulation_rounds:
  - ISIMIP4b
  products:
  - SecondaryOutputData
  sectors:
  - biomes

- specifier: hndep
  description: >-
    Nitrogen deposition according to *High emission scenario*.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - biomes

- specifier: nondep
  description: >-
    No nitrogen cycling.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - biomes

- specifier: nondep2021co2
  description: >-
    No nitrogen cycling and CO₂ concentration fixed at 2021 levels.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - biomes

- specifier: 2021gs
  description: >-
    In this sensitivity scenario all climate-related forcings and DHF change as indicated
    by the climate-related forcing or DHF specifier defined above while only growing
    seasons are fixed at 2021 levels.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  group3: true

- specifier: 2021fert
  description: >-
    In this sensitivity scenario all climate-related forcings and DHF change as
    indicated by the climate-related forcing or DHF specifier defined above while only
    fertilizer inputs are fixed at 2021 levels.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  group3: true

- specifier: fullfert
  description: >-
    In this sensitivity scenario all climate-related forcings and DHF change as
    indicated by the climate-related forcing or DHF specifier defined above, but fertilizer
    inputs are increased to a level that the crop is not limited by nitrogen deficits.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - agriculture
  group3: true

- specifier: varlightning
  description: >-
    Future RCP-specific lightening data from UKESM.
  description_note: Please note, as the future lightning dataset is produced using
    UKESM output, modelers should **only perform this sensitivity experiment using
    UKESM climate forcing**, not with the other climate forcing datasets.
  simulation_rounds:
  - ISIMIP4b
  sectors:
  - fire

- specifier: 1850co2
  description: >-
    CO₂ concentration fixed at 1850 levels.
  description_note: Only for allowing the QC-Tool to let such experiment pass
  simulation_rounds:
  - ISIMIP4b
  products:
  - SecondaryOutputData
  sectors:
  - water_global
